services:
  api:
    command:
      - uv
      - run
      - uvicorn
      - app.main:create_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/app
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./app:/app/app
    ports:
      - "127.0.0.1:8000:8000"

  migrate:
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro

  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"
